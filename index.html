<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>전투기 피하기 게임</title>

<style>
body{
    margin:0;
    background:#FFF8C6;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:sans-serif;
}

canvas{
    background:#FFF8C6;
    border:3px solid #444;
}
</style>
</head>

<body>

<canvas id="game" width="400" height="600"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const player={
    x:185,
    y:520,
    width:30,
    height:30,
    speed:6
};

let enemies=[];
let score=0;
let gameOver=false;
let keys={};

let bestScore=localStorage.getItem("bestScore")||0;

// -------------------- 입력

document.addEventListener("keydown",(e)=>{

    if(gameOver && e.key==="Enter"){
        restartGame();
        return;
    }

    keys[e.key]=true;
});

document.addEventListener("keyup",(e)=>{
    keys[e.key]=false;
});

// -------------------- 재시작

function restartGame(){

    enemies=[];
    score=0;
    gameOver=false;
    keys={};

    player.x=185;
    player.y=520;
}

// -------------------- 전투기 그리기

function drawPlayer(){

    const x=player.x;
    const y=player.y;

    ctx.save();
    ctx.translate(x,y);

    // 몸체
    ctx.fillStyle="#1E90FF";
    ctx.beginPath();
    ctx.moveTo(15,0);
    ctx.lineTo(30,30);
    ctx.lineTo(22,26);
    ctx.lineTo(15,30);
    ctx.lineTo(8,26);
    ctx.lineTo(0,30);
    ctx.closePath();
    ctx.fill();

    // 날개
    ctx.fillStyle="#4FC3FF";
    ctx.fillRect(4,14,22,6);

    // 조종석
    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.arc(15,10,3,0,Math.PI*2);
    ctx.fill();

    // 엔진 불꽃
    ctx.fillStyle="orange";
    ctx.beginPath();
    ctx.moveTo(10,30);
    ctx.lineTo(15,40 + Math.random()*3);
    ctx.lineTo(20,30);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
}

// -------------------- 장애물 생성

function spawnEnemy(){

    const level=Math.floor(score/30); // 난이도 천천히 상승
    const count=Math.min(1+level,6);

    for(let i=0;i<count;i++){

        enemies.push({

            x:Math.random()*(canvas.width-50),
            y:-Math.random()*200,
            width:50,
            height:50,
            speed:2.5 + Math.random()*1.5 + level*0.15

        });
    }
}

setInterval(()=>{

    if(!gameOver){
        spawnEnemy();
    }

},900);

// -------------------- 업데이트

function update(){

    if(keys["ArrowLeft"]) player.x-=player.speed;
    if(keys["ArrowRight"]) player.x+=player.speed;
    if(keys["ArrowUp"]) player.y-=player.speed;
    if(keys["ArrowDown"]) player.y+=player.speed;

    player.x=Math.max(0,Math.min(canvas.width-player.width,player.x));
    player.y=Math.max(0,Math.min(canvas.height-player.height,player.y));

    for(let i=enemies.length-1;i>=0;i--){

        let e=enemies[i];

        e.y+=e.speed;

        if(e.y>canvas.height){

            enemies.splice(i,1);
            score++;

            if(score>bestScore){
                bestScore=score;
                localStorage.setItem("bestScore",bestScore);
            }

            continue;
        }

        // 충돌
        if(
            player.x < e.x + e.width &&
            player.x + player.width > e.x &&
            player.y < e.y + e.height &&
            player.y + player.height > e.y
        ){
            gameOver=true;
        }
    }
}

// -------------------- 그리기

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // 플레이어
    drawPlayer();

    // 장애물
    ctx.fillStyle="red";
    enemies.forEach(e=>{
        ctx.fillRect(e.x,e.y,e.width,e.height);
    });

    // UI
    ctx.fillStyle="#222";
    ctx.font="20px Arial";
    ctx.fillText("점수: "+score,10,25);
    ctx.fillText("최고: "+bestScore,280,25);
    ctx.fillText("난이도: "+(Math.floor(score/30)+1),10,50);

    if(gameOver){

        ctx.fillStyle="rgba(0,0,0,0.5)";
        ctx.fillRect(0,0,400,600);

        ctx.fillStyle="white";
        ctx.font="40px Arial";
        ctx.fillText("GAME OVER",55,260);

        ctx.font="20px Arial";
        ctx.fillText("ENTER 키로 재시작",95,310);
    }
}

// -------------------- 루프

function loop(){

    if(!gameOver){
        update();
    }

    draw();
    requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
